name: Sync Rosters

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sync-rosters
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      WIKIPEDIA_ROSTERS_PAGE: ${{ vars.WIKIPEDIA_ROSTERS_PAGE }}
      WIKIPEDIA_API_ENDPOINT: ${{ vars.WIKIPEDIA_API_ENDPOINT }}
      WIKIPEDIA_TIMEOUT_MS: ${{ vars.WIKIPEDIA_TIMEOUT_MS }}
      WIKIPEDIA_USER_AGENT: "wm-2026-panini-liga/0.1 (https://github.com/Wiiii90/paniwi; private hobby project; contact: wilhelmaltemeier@gmail.com)"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run sync:rosters
      - run: npm run build
        env:
          GITHUB_PAGES: "true"
      - run: cp dist/index.html dist/404.html
      - name: Commit roster snapshot
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update roster snapshot"
          file_pattern: public/data/rosters.json
      - uses: actions/configure-pages@v6
        if: steps.commit.outputs.changes_detected == 'true'
      - uses: actions/upload-pages-artifact@v4
        if: steps.commit.outputs.changes_detected == 'true'
        with:
          path: dist
      - id: deployment
        if: steps.commit.outputs.changes_detected == 'true'
        uses: actions/deploy-pages@v5
