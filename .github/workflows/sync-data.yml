name: Sync Data

on:
  workflow_dispatch:
    inputs:
      sync_source:
        description: "Source mode for this run: football-data, api-football-enrich, wikipedia, or mock"
        required: false
        default: "football-data"
      force_sync:
        description: "Skip schedule gate and sync immediately"
        required: false
        default: "false"
      football_data_date_from:
        description: "Optional Football-Data dateFrom override, for example 2026-06-28"
        required: false
        default: ""
      football_data_date_to:
        description: "Optional Football-Data dateTo override, inclusive, for example 2026-07-03"
        required: false
        default: ""
      football_data_dates:
        description: "Optional comma-separated Football-Data date list override"
        required: false
        default: ""
      football_data_maintenance_lookahead_days:
        description: "Optional maintenance lookahead in UTC days"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sync-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: [self-hosted, paniwi]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      SYNC_SOURCE: ${{ github.event.inputs.sync_source || 'football-data' }}
      SYNC_FORCE: ${{ github.event.inputs.force_sync || 'false' }}
      FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
      FOOTBALL_DATA_BASE_URL: ${{ vars.FOOTBALL_DATA_BASE_URL }}
      FOOTBALL_DATA_COMPETITION: ${{ vars.FOOTBALL_DATA_COMPETITION }}
      FOOTBALL_DATA_SEASON: ${{ vars.FOOTBALL_DATA_SEASON }}
      FOOTBALL_DATA_DATE_FROM: ${{ github.event.inputs.football_data_date_from || vars.FOOTBALL_DATA_DATE_FROM }}
      FOOTBALL_DATA_DATE_TO: ${{ github.event.inputs.football_data_date_to || vars.FOOTBALL_DATA_DATE_TO }}
      FOOTBALL_DATA_DATES: ${{ github.event.inputs.football_data_dates || vars.FOOTBALL_DATA_DATES }}
      FOOTBALL_DATA_TIMEOUT_MS: ${{ vars.FOOTBALL_DATA_TIMEOUT_MS }}
      FOOTBALL_DATA_MAX_REQUESTS: ${{ vars.FOOTBALL_DATA_MAX_REQUESTS }}
      FOOTBALL_DATA_SCORER_LIMIT: ${{ vars.FOOTBALL_DATA_SCORER_LIMIT }}
      FOOTBALL_DATA_MAX_THROTTLE_MS: ${{ vars.FOOTBALL_DATA_MAX_THROTTLE_MS }}
      FOOTBALL_DATA_MAINTENANCE_LOOKAHEAD_DAYS: ${{ github.event.inputs.football_data_maintenance_lookahead_days || vars.FOOTBALL_DATA_MAINTENANCE_LOOKAHEAD_DAYS }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      API_FOOTBALL_BASE_URL: ${{ vars.API_FOOTBALL_BASE_URL }}
      API_FOOTBALL_TIMEOUT_MS: ${{ vars.API_FOOTBALL_TIMEOUT_MS }}
      API_FOOTBALL_ENRICH_MAX_REQUESTS: ${{ vars.API_FOOTBALL_ENRICH_MAX_REQUESTS }}
      API_FOOTBALL_ENRICH_EXTRA_MATCH_LIMIT: ${{ vars.API_FOOTBALL_ENRICH_EXTRA_MATCH_LIMIT }}
      API_FOOTBALL_ENRICH_MATCH_IDS: ${{ vars.API_FOOTBALL_ENRICH_MATCH_IDS }}
      WIKIPEDIA_GOALS_PAGE: ${{ vars.WIKIPEDIA_GOALS_PAGE }}
      WIKIPEDIA_API_ENDPOINT: ${{ vars.WIKIPEDIA_API_ENDPOINT }}
      WIKIPEDIA_TIMEOUT_MS: ${{ vars.WIKIPEDIA_TIMEOUT_MS }}
      WIKIPEDIA_USER_AGENT: "wm-2026-panini-liga/0.1 (https://github.com/Wiiii90/paniwi; private hobby project; contact: wilhelmaltemeier@gmail.com)"
    steps:
      - uses: actions/checkout@v6
      - id: early_gate
        run: node scripts/sync-gate.mjs
      - uses: actions/setup-node@v6
        if: steps.early_gate.outputs.should_run == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.early_gate.outputs.should_run == 'true'
      - id: scheduled_sync
        run: npm run sync:scheduled
        if: steps.early_gate.outputs.should_run == 'true'
      - run: npm test
        if: steps.scheduled_sync.outputs.sync_performed == 'true'
      - run: npm run build
        if: steps.scheduled_sync.outputs.sync_performed == 'true'
        env:
          GITHUB_PAGES: "true"
      - run: cp dist/index.html dist/404.html
        if: steps.scheduled_sync.outputs.sync_performed == 'true'
      - name: Commit data snapshot
        id: commit
        if: steps.scheduled_sync.outputs.sync_performed == 'true'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- public/data/*.json
          if (git diff --cached --quiet) {
            "changes_detected=false" >> $env:GITHUB_OUTPUT
            Write-Host "No data snapshot changes to commit."
          } else {
            git commit -m "chore: update static goal data"
            git push
            "changes_detected=true" >> $env:GITHUB_OUTPUT
          }
      - uses: actions/configure-pages@v6
        if: steps.scheduled_sync.outputs.sync_performed == 'true'
      - name: Archive Pages artifact
        if: steps.scheduled_sync.outputs.sync_performed == 'true'
        shell: pwsh
        run: |
          if (Test-Path artifact.tar) {
            Remove-Item artifact.tar
          }
          tar -cf artifact.tar -C dist .
      - uses: actions/upload-artifact@v4
        if: steps.scheduled_sync.outputs.sync_performed == 'true'
        with:
          name: github-pages
          path: artifact.tar
          retention-days: 1
          if-no-files-found: error
      - id: deployment
        if: steps.scheduled_sync.outputs.sync_performed == 'true'
        uses: actions/deploy-pages@v5
