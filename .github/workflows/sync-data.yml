name: Sync Data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      sync_source:
        description: "Source mode for this run: auto, mock, wikipedia, or api-football"
        required: false
        default: "auto"

permissions:
  contents: write

concurrency:
  group: sync-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SYNC_SOURCE: ${{ github.event.inputs.sync_source || 'auto' }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      API_FOOTBALL_FIXTURE_IDS: ${{ vars.API_FOOTBALL_FIXTURE_IDS }}
      API_FOOTBALL_BASE_URL: ${{ vars.API_FOOTBALL_BASE_URL }}
      API_FOOTBALL_TIMEOUT_MS: ${{ vars.API_FOOTBALL_TIMEOUT_MS }}
      WIKIPEDIA_GOALS_PAGE: ${{ vars.WIKIPEDIA_GOALS_PAGE }}
      WIKIPEDIA_API_ENDPOINT: ${{ vars.WIKIPEDIA_API_ENDPOINT }}
      WIKIPEDIA_TIMEOUT_MS: ${{ vars.WIKIPEDIA_TIMEOUT_MS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run sync:data
      - run: npm run build
      - name: Commit data snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update static goal data"
          file_pattern: public/data/*.json
