name: Sync Data

on:
  workflow_dispatch:
    inputs:
      sync_source:
        description: "Source mode for this run: football-data, api-football, wikipedia, or mock"
        required: false
        default: "football-data"
      force_sync:
        description: "Skip schedule gate and sync immediately"
        required: false
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sync-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: [self-hosted, paniwi]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      SYNC_SOURCE: ${{ github.event.inputs.sync_source || 'football-data' }}
      SYNC_FORCE: ${{ github.event.inputs.force_sync || 'false' }}
      FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
      FOOTBALL_DATA_BASE_URL: ${{ vars.FOOTBALL_DATA_BASE_URL }}
      FOOTBALL_DATA_COMPETITION: ${{ vars.FOOTBALL_DATA_COMPETITION }}
      FOOTBALL_DATA_SEASON: ${{ vars.FOOTBALL_DATA_SEASON }}
      FOOTBALL_DATA_DATE_FROM: ${{ vars.FOOTBALL_DATA_DATE_FROM }}
      FOOTBALL_DATA_DATE_TO: ${{ vars.FOOTBALL_DATA_DATE_TO }}
      FOOTBALL_DATA_DATES: ${{ vars.FOOTBALL_DATA_DATES }}
      FOOTBALL_DATA_TIMEOUT_MS: ${{ vars.FOOTBALL_DATA_TIMEOUT_MS }}
      FOOTBALL_DATA_MAX_REQUESTS: ${{ vars.FOOTBALL_DATA_MAX_REQUESTS }}
      FOOTBALL_DATA_MAX_THROTTLE_MS: ${{ vars.FOOTBALL_DATA_MAX_THROTTLE_MS }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      API_FOOTBALL_DATES: ${{ vars.API_FOOTBALL_DATES }}
      API_FOOTBALL_DATE_FROM: ${{ vars.API_FOOTBALL_DATE_FROM }}
      API_FOOTBALL_DATE_TO: ${{ vars.API_FOOTBALL_DATE_TO }}
      API_FOOTBALL_FIXTURE_IDS: ${{ vars.API_FOOTBALL_FIXTURE_IDS }}
      API_FOOTBALL_BASE_URL: ${{ vars.API_FOOTBALL_BASE_URL }}
      API_FOOTBALL_TIMEOUT_MS: ${{ vars.API_FOOTBALL_TIMEOUT_MS }}
      API_FOOTBALL_MAX_REQUESTS: ${{ vars.API_FOOTBALL_MAX_REQUESTS }}
      API_FOOTBALL_MAX_LINEUP_REQUESTS: ${{ vars.API_FOOTBALL_MAX_LINEUP_REQUESTS }}
      WIKIPEDIA_GOALS_PAGE: ${{ vars.WIKIPEDIA_GOALS_PAGE }}
      WIKIPEDIA_API_ENDPOINT: ${{ vars.WIKIPEDIA_API_ENDPOINT }}
      WIKIPEDIA_TIMEOUT_MS: ${{ vars.WIKIPEDIA_TIMEOUT_MS }}
      WIKIPEDIA_USER_AGENT: "wm-2026-panini-liga/0.1 (https://github.com/Wiiii90/paniwi; private hobby project; contact: wilhelmaltemeier@gmail.com)"
    steps:
      - uses: actions/checkout@v6
      - id: early_gate
        run: node scripts/sync-gate.mjs
      - uses: actions/setup-node@v6
        if: steps.early_gate.outputs.should_run == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.early_gate.outputs.should_run == 'true'
      - id: scheduled_sync
        run: npm run sync:scheduled
        if: steps.early_gate.outputs.should_run == 'true'
      - run: npm test
        if: steps.scheduled_sync.outputs.sync_performed == 'true'
      - run: npm run build
        if: steps.scheduled_sync.outputs.sync_performed == 'true'
        env:
          GITHUB_PAGES: "true"
      - run: cp dist/index.html dist/404.html
        if: steps.scheduled_sync.outputs.sync_performed == 'true'
      - name: Commit data snapshot
        id: commit
        if: steps.scheduled_sync.outputs.sync_performed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update static goal data"
          file_pattern: public/data/*.json
      - uses: actions/configure-pages@v6
        if: steps.commit.outputs.changes_detected == 'true'
      - uses: actions/upload-pages-artifact@v4
        if: steps.commit.outputs.changes_detected == 'true'
        with:
          path: dist
      - id: deployment
        if: steps.commit.outputs.changes_detected == 'true'
        uses: actions/deploy-pages@v5
