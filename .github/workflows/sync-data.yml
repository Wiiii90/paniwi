name: Sync Data

on:
  schedule:
    # Poll every 15 minutes during the tournament; Wikipedia is only called inside post-match windows.
    - cron: "*/15 * 11-30 6 *"
    - cron: "*/15 * 1-19 7 *"
  workflow_dispatch:
    inputs:
      sync_source:
        description: "Source mode for this run: auto, mock, wikipedia, or api-football"
        required: false
        default: "wikipedia"
      force_sync:
        description: "Skip schedule gate and sync immediately"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: sync-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SYNC_SOURCE: ${{ github.event.inputs.sync_source || 'wikipedia' }}
      SYNC_FORCE: ${{ github.event.inputs.force_sync || 'false' }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      API_FOOTBALL_DATES: ${{ vars.API_FOOTBALL_DATES }}
      API_FOOTBALL_DATE_FROM: ${{ vars.API_FOOTBALL_DATE_FROM }}
      API_FOOTBALL_DATE_TO: ${{ vars.API_FOOTBALL_DATE_TO }}
      API_FOOTBALL_FIXTURE_IDS: ${{ vars.API_FOOTBALL_FIXTURE_IDS }}
      API_FOOTBALL_BASE_URL: ${{ vars.API_FOOTBALL_BASE_URL }}
      API_FOOTBALL_TIMEOUT_MS: ${{ vars.API_FOOTBALL_TIMEOUT_MS }}
      WIKIPEDIA_GOALS_PAGE: ${{ vars.WIKIPEDIA_GOALS_PAGE }}
      WIKIPEDIA_API_ENDPOINT: ${{ vars.WIKIPEDIA_API_ENDPOINT }}
      WIKIPEDIA_TIMEOUT_MS: ${{ vars.WIKIPEDIA_TIMEOUT_MS }}
      WIKIPEDIA_USER_AGENT: wm-2026-panini-liga/0.1 (https://github.com/Wiiii90/paniwi; private hobby project; contact: wilhelmaltemeier@gmail.com)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run sync:scheduled
      - run: npm run build
      - name: Commit data snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update static goal data"
          file_pattern: public/data/*.json
